services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    user: root
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data"
    volumes:
      - dynamodb-data:/data
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/8000' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Allow browser uploads via presigned URLs from any origin in dev
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      args:
        # VERSION must be a unique-per-deploy identifier (git sha or
        # release tag) so the upgrade banner fires on tabs left open
        # across rebuilds. The Makefile sets this from `git rev-parse
        # --short HEAD` before `docker compose up`; CI should set it
        # explicitly. Defaults to "dev" — banner stays silent.
        VERSION: ${VERSION:-dev}
    ports:
      - "8080:8080"
    restart: on-failure
    env_file: .env
    environment:
      PORT: "8080"
      ENV: development
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      DYNAMODB_TABLE: exdb
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-me
      BASE_URL: http://localhost:8080
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_BUCKET: ex-avatars
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
    depends_on:
      dynamodb:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  dynamodb-data:
  minio-data:
