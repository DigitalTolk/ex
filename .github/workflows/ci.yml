name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GO_VERSION: '1.26.2'
  NODE_VERSION: '24'

jobs:
  # Lint runs first and fails fast — no point spinning up the test
  # containers, building images, or publishing coverage if the code doesn't
  # even pass static checks.
  lint:
    name: Lint (backend + frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend deps
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npx eslint src/

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc -p tsconfig.json --noEmit

  test-backend:
    name: Backend tests + coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run go test with coverage (testcontainers)
        run: |
          go test -tags=integration -coverprofile=coverage.out -covermode=atomic ./internal/...
          go tool cover -func=coverage.out | tail -1

      - name: Upload backend coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.out
          format: golang
          flag-name: backend
          parallel: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

  test-frontend:
    name: Frontend tests + coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run vitest with coverage
        working-directory: frontend
        run: npx vitest run --coverage

      - name: Upload frontend coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: frontend/coverage/lcov.info
          flag-name: frontend
          parallel: true
          base-path: frontend
          github-token: ${{ secrets.GITHUB_TOKEN }}

  coverage-finish:
    # Tells Coveralls that all parallel coverage uploads are done so it can
    # combine them into a single report.
    name: Finalize Coveralls
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: always()
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
          carryforward: backend,frontend
          github-token: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build (and publish on tag) Docker image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4

      # Only authenticate with GHCR when we intend to push — i.e. on a
      # version tag like v1.2.3. PR builds verify the Dockerfile compiles
      # but never publish.
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=pr
            type=sha,format=short

      - name: Build (PR) or Build & Push (tag)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
