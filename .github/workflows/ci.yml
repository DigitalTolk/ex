name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME is computed inside each Docker job because GHCR rejects
  # mixed-case repository paths and there's no expression-level lowercase
  # in GitHub Actions. ${{ github.repository }} preserves the configured
  # case (e.g. DigitalTolk/ex) so we lowercase it via tr in setup steps.
  GO_VERSION: '1.26.2'
  NODE_VERSION: '24'

jobs:
  # Lint runs first and fails fast — no point spinning up the test
  # containers, building images, or publishing coverage if the code doesn't
  # even pass static checks.
  lint:
    name: Lint (backend + frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend deps
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npx eslint src/

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc -p tsconfig.json --noEmit

  test-backend:
    name: Backend tests + coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run go test with coverage (testcontainers)
        run: |
          go test -tags=integration -coverprofile=coverage.out -covermode=atomic ./internal/...
          go tool cover -func=coverage.out | tail -1

      - name: Upload backend coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.out
          format: golang
          flag-name: backend
          parallel: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

  test-frontend:
    name: Frontend tests + coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run vitest with coverage
        working-directory: frontend
        run: npx vitest run --coverage

      - name: Upload frontend coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: frontend/coverage/lcov.info
          flag-name: frontend
          parallel: true
          base-path: frontend
          github-token: ${{ secrets.GITHUB_TOKEN }}

  coverage-finish:
    # Tells Coveralls that all parallel coverage uploads are done so it can
    # combine them into a single report.
    name: Finalize Coveralls
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: always()
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
          carryforward: backend,frontend
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Multi-arch builds are split across two native runners (amd64 + arm64)
  # and merged into a single manifest at the end. Building each arch on
  # its own native runner avoids the slow QEMU emulation we used to do
  # on a single ubuntu-latest job — typical end-to-end build time drops
  # from 8–10 min to 2–3 min.
  #
  # On PR: each per-arch job runs build-only (push: false) so we still
  # gate the merge on Dockerfile correctness.
  # On tag: per-arch jobs push to the registry by digest only (no tags),
  # then `docker-manifest` stitches the digests under the user-facing
  # semver tags.
  docker-build:
    name: Build (${{ matrix.arch }})
    needs: [test-backend, test-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          # On tag: push by digest only; no tags here — the manifest job
          # stitches the digests together under the user-facing tags.
          # On PR: build-only smoke test.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ startsWith(github.ref, 'refs/tags/v') }}
          build-args: |
            GIT_TAG=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
            GIT_SHA=${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      # Ferry the digest to the manifest job via an artifact. Matrix
      # job outputs collapse to the last shard's value on GitHub
      # Actions, so an artifact-per-shard is the canonical workaround.
      - name: Stage digest for manifest job
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p /tmp/digests
          digest='${{ steps.build.outputs.digest }}'
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Publish multi-arch manifest
    needs: docker-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Semver triplet on releases. We deliberately do NOT publish
          # per-commit sha tags — they bloat the GHCR package list and
          # aren't reachable by downstream consumers anyway.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          # Each downloaded artefact is an empty file named after its
          # digest hex (no "sha256:" prefix). Build one imagetools
          # create per metadata-action tag so they all point at the
          # same multi-arch manifest list.
          srcs=()
          for f in *; do
            srcs+=("${IMAGE}@sha256:${f}")
          done
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create -t "$tag" "${srcs[@]}"
          done <<< "${{ steps.meta.outputs.tags }}"
